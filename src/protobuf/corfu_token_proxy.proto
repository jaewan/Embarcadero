syntax = "proto3";

package corfutokenproxy;

// Client-to-ingress-broker token phase.  The payload socket remains unchanged;
// the proxy only relays the existing Corfu token request to the selected broker.
service CorfuTokenProxy {
  rpc GetTotalOrder(TokenRequest) returns (TokenResponse) {}
}

message TokenRequest {
  uint64 client_id = 1;
  uint64 batchseq = 2;
  uint64 num_msg = 3;
  uint64 total_size = 4;
  uint32 broker_id = 5;
}

message TokenResponse {
  uint64 total_order = 1;
  uint64 log_idx = 2;
  uint64 broker_batch_seq = 3;
}
