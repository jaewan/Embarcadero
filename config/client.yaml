client:
  runtime:
    mode: throughput
    ack_drain_ms_throughput: 50
    ack_drain_ms_failure: 3000
    ack_drain_ms_latency: 0
    socket_send_buffer_bytes_throughput: 268435456
    socket_send_buffer_bytes_failure: 16777216
    socket_send_buffer_bytes_latency: 16777216
    socket_recv_buffer_bytes_throughput: 268435456
    socket_recv_buffer_bytes_failure: 16777216
    socket_recv_buffer_bytes_latency: 16777216
    tcp_user_timeout_ms_throughput: 500
    tcp_user_timeout_ms_failure: 200
    tcp_user_timeout_ms_latency: 500
    ack_timeout_sec_throughput: 120
    ack_timeout_sec_failure: 120
    ack_timeout_sec_latency: 120
    epoll_wait_writable_ms_throughput: 1
    epoll_wait_writable_ms_failure: 0
    epoll_wait_writable_ms_latency: 1

  publisher:
    threads_per_broker: 3   # Optimal for co-located config (10-12 GB/s, 4 brokers × 3 threads = 12 streams).
    #
    # SENTINEL NOTE: main.cc treats -n 4 as a sentinel that reads this yaml value instead.
    # Passing -n 3 (or any value ≠ 4) uses that value directly.
    # run_overnight_eval.sh passes THREADS_PER_BROKER=6 for throughput cells to bypass the
    # sentinel and use 6 actual threads/broker → 24 streams → higher per-client ceiling.
    #
    # 1024 MB per buffer so 12 buffers (3 threads/broker × 4 brokers) hold 10 GB total (12 × 1 GB = 12 GB ≥ 10 GB).
    # Min would be ceil(10/12) GB ≈ 854 MB; 1024 MB gives headroom so 10 GB test does not wrap.
    buffer_size_mb: 1024
    #
    # batch_size_kb: client publish-side batch target (2 MB = 2048 KB, matches theoretical ceiling
    # of 4.0 GB/s at 500 µs/epoch = 2000 epochs/sec × 2 MB/epoch).
    # To increase batch size for throughput mode WITHOUT editing this file, set:
    #   EMBARCADERO_CLIENT_PUB_BATCH_KB=4096  (4 MB/batch → doubles throughput ceiling per epoch)
    # Keep this yaml at 2048 to preserve latency-mode behaviour (linger accumulates < 2 MB).
    batch_size_kb: 2048
  
  subscriber:
    # connections_per_broker is not read from YAML; use env EMBARCADERO_SUB_CONNECTIONS.
    # Default changed to 1: triplication (3×) wasted 2/3 of NIC bandwidth causing EAGAIN
    # stalls on every batch.  1 connection per broker eliminates contention and raises
    # unique subscribe throughput from ~1 GB/s to ~10 GB/s on 100 GbE.
    buffer_size_mb: 256
  
  network:
    connect_timeout_ms: 2000
    send_timeout_ms: 5000
    recv_timeout_ms: 5000
  
  performance:
    use_hugepages: true
    numa_bind: true
    zero_copy: true
    # Lightweight publisher pipeline profile (buffer write + send). Set true to log at shutdown.
    enable_publisher_pipeline_profile: true
