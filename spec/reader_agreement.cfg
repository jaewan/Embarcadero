\* Reader-agreement / sole-divergence (D5 theorem clause 3), the hard case: a
\* speculative (ACK1) reader + module loss + failover. Positions that reach
\* durability never reorder/change identity (ReaderAgreement); speculative-zone
\* reads are epoch-scoped and re-read after failover; the only within-epoch
\* divergence is payload visibility. 1 session.
SPECIFICATION Spec
CONSTANTS
    Clients = {c1}
    Brokers = {b1, b2}
    MaxSeq = 2
    GOICap = 2
    MaxEpoch = 1
    MaxReopen = 0
    EnableBrokerCrash = FALSE
    EnableFailover = TRUE
    EnableStaleCVRelay = FALSE
    EnableAckEpochCheck = TRUE
    EnableModuleLoss = TRUE
    EnableLeasePause = FALSE
    EnableReopen = FALSE
    EnableSpecReader = TRUE
SYMMETRY Symmetry
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT Safety
