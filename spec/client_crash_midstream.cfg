\* W2 #6 --- client crash mid-stream. A gap that outlives retransmission fences the
\* session; the uncommitted suffix is never committed (FencedSuffixNeverCommitted).
\* Fencing is terminal here (no re-open); exactly-once-across-fence is exactly_once_fence.cfg.
SPECIFICATION Spec
CONSTANTS
    Clients = {c1, c2}
    Brokers = {b1, b2}
    MaxSeq = 2
    GOICap = 3
    MaxEpoch = 0
    MaxReopen = 0
    EnableBrokerCrash = TRUE
    EnableFailover = FALSE
    EnableStaleCVRelay = FALSE
    EnableAckEpochCheck = TRUE
    EnableModuleLoss = FALSE
    EnableLeasePause = FALSE
    EnableReopen = FALSE
    EnableSpecReader = FALSE
SYMMETRY Symmetry
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT Safety
