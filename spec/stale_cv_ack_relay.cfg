\* W2 #5 (PRIORITY --- the newly-found bug) --- stale-CV ACK relay after election,
\* WITH the fix. A zombie S_old advances the CV (real action, StaleCVAdvance) for
\* truncated batches under its old epoch; the broker validates the control-block
\* epoch on the ACK relay path (EnableAckEpochCheck) and refuses the stale signal.
\* "ACKed iff committed" (AckedIffCommitted) must hold. 1 session (per-session bug).
SPECIFICATION Spec
CONSTANTS
    Clients = {c1}
    Brokers = {b1, b2}
    MaxSeq = 2
    GOICap = 2
    MaxEpoch = 1
    MaxReopen = 0
    EnableBrokerCrash = FALSE
    EnableFailover = TRUE
    EnableStaleCVRelay = TRUE
    EnableAckEpochCheck = TRUE
    EnableModuleLoss = FALSE
    EnableLeasePause = FALSE
    EnableReopen = FALSE
    EnableSpecReader = FALSE
SYMMETRY Symmetry
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT Safety
