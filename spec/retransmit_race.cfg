\* W2 #2 --- retransmit races: batch n retransmitted to a different broker under
\* broker loss. The duplicate is discarded by dedup, never reordered.
SPECIFICATION Spec
CONSTANTS
    Clients = {c1, c2}
    Brokers = {b1, b2}
    MaxSeq = 2
    GOICap = 3
    MaxEpoch = 0
    MaxReopen = 0
    EnableBrokerCrash = TRUE
    EnableFailover = FALSE
    EnableStaleCVRelay = FALSE
    EnableAckEpochCheck = TRUE
    EnableModuleLoss = FALSE
    EnableLeasePause = FALSE
    EnableReopen = FALSE
    EnableSpecReader = FALSE
SYMMETRY Symmetry
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT Safety
