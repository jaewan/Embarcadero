\* W2 #5 (necessity demo) --- same as stale_cv_ack_relay but with the ACK-relay
\* epoch check DISABLED. TLC is EXPECTED to report an AckedIffCommitted violation:
\* the broker relays an ACK for an orphaned (truncated) batch that never becomes
\* visible. Proves the epoch check (D2) is load-bearing. A counterexample cfg.
SPECIFICATION Spec
CONSTANTS
    Clients = {c1}
    Brokers = {b1, b2}
    MaxSeq = 2
    GOICap = 2
    MaxEpoch = 1
    MaxReopen = 0
    EnableBrokerCrash = FALSE
    EnableFailover = TRUE
    EnableStaleCVRelay = TRUE
    EnableAckEpochCheck = FALSE
    EnableModuleLoss = FALSE
    EnableLeasePause = FALSE
    EnableReopen = FALSE
    EnableSpecReader = FALSE
SYMMETRY Symmetry
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT Safety
