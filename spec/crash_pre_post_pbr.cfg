\* W2 #1 --- broker crash pre- vs post-PBR publication. Reserved-but-unwritten
\* dies with the host; written PBR survives in CXL; client recovers by retransmit.
SPECIFICATION Spec
CONSTANTS
    Clients = {c1, c2}
    Brokers = {b1, b2}
    MaxSeq = 2
    GOICap = 3
    MaxEpoch = 0
    MaxReopen = 0
    EnableBrokerCrash = TRUE
    EnableFailover = FALSE
    EnableStaleCVRelay = FALSE
    EnableAckEpochCheck = TRUE
    EnableModuleLoss = FALSE
    EnableLeasePause = FALSE
    EnableReopen = FALSE
    EnableSpecReader = FALSE
SYMMETRY Symmetry
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT Safety
