\* W2 #3 (THE NAMED ONE) --- a retransmitted duplicate arriving at S_new inside
\* the spatial-guard window. Failover + retransmit + tight wrap-fence (GOICap=2).
\* 1 session (per-session property); cross-session covered by non-failover cfgs.
SPECIFICATION Spec
CONSTANTS
    Clients = {c1}
    Brokers = {b1, b2}
    MaxSeq = 2
    GOICap = 2
    MaxEpoch = 1
    MaxReopen = 0
    EnableBrokerCrash = TRUE
    EnableFailover = TRUE
    EnableStaleCVRelay = FALSE
    EnableAckEpochCheck = TRUE
    EnableModuleLoss = FALSE
    EnableLeasePause = FALSE
    EnableReopen = FALSE
    EnableSpecReader = FALSE
SYMMETRY Symmetry
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT Safety
