\* W2 #7 --- sequencer failover during an open gap. S_new rebuilds session tables
\* from the surviving GOI and rescans PBRs from the durable frontier (D3/D7); dedup
\* discards already-committed batches and re-sequences the rest. 1 session.
SPECIFICATION Spec
CONSTANTS
    Clients = {c1}
    Brokers = {b1, b2}
    MaxSeq = 2
    GOICap = 3
    MaxEpoch = 1
    MaxReopen = 0
    EnableBrokerCrash = TRUE
    EnableFailover = TRUE
    EnableStaleCVRelay = FALSE
    EnableAckEpochCheck = TRUE
    EnableModuleLoss = FALSE
    EnableLeasePause = FALSE
    EnableReopen = FALSE
    EnableSpecReader = FALSE
SYMMETRY Symmetry
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT Safety
