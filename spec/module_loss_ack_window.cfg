\* W2 #8 --- CXL-module loss in the ACK1->ACK2 window (D5), with a speculative
\* (ACK1) reader. Order/identity survive (PerSessionPrefix, ReaderAgreement); the
\* loss is surfaced, never silent (AckedIffCommitted: no ACK for a lost entry).
\* 1 session (per-session properties).
SPECIFICATION Spec
CONSTANTS
    Clients = {c1}
    Brokers = {b1, b2}
    MaxSeq = 2
    GOICap = 3
    MaxEpoch = 0
    MaxReopen = 0
    EnableBrokerCrash = FALSE
    EnableFailover = FALSE
    EnableStaleCVRelay = FALSE
    EnableAckEpochCheck = TRUE
    EnableModuleLoss = TRUE
    EnableLeasePause = FALSE
    EnableReopen = FALSE
    EnableSpecReader = TRUE
SYMMETRY Symmetry
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT Safety
