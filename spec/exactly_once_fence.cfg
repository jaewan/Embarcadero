\* Exactly-once across fencing (D1) --- a fenced-but-live client re-opens under a
\* new session generation and resubmits the uncommitted suffix from its HWM. No
\* batch is committed twice (NoDupCommit) and the prefix stays contiguous
\* (PerSessionPrefix): exactly-once + in-order across the fence. 1 session.
SPECIFICATION Spec
CONSTANTS
    Clients = {c1}
    Brokers = {b1, b2}
    MaxSeq = 2
    GOICap = 3
    MaxEpoch = 0
    MaxReopen = 1
    EnableBrokerCrash = TRUE
    EnableFailover = FALSE
    EnableStaleCVRelay = FALSE
    EnableAckEpochCheck = TRUE
    EnableModuleLoss = FALSE
    EnableLeasePause = FALSE
    EnableReopen = TRUE
    EnableSpecReader = FALSE
SYMMETRY Symmetry
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT Safety
