\* W2 #4 --- lease false positive (SIGSTOP pause). A live-but-paused broker is
\* suspected; the client retransmits elsewhere; the duplicate is discarded by
\* dedup on resume. Safety never depends on the detector.
SPECIFICATION Spec
CONSTANTS
    Clients = {c1, c2}
    Brokers = {b1, b2}
    MaxSeq = 2
    GOICap = 3
    MaxEpoch = 0
    MaxReopen = 0
    EnableBrokerCrash = FALSE
    EnableFailover = FALSE
    EnableStaleCVRelay = FALSE
    EnableAckEpochCheck = TRUE
    EnableModuleLoss = FALSE
    EnableLeasePause = TRUE
    EnableReopen = FALSE
    EnableSpecReader = FALSE
SYMMETRY Symmetry
CONSTRAINT StateConstraint
INVARIANT TypeOK
INVARIANT Safety
